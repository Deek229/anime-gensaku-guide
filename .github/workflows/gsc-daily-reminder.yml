# 毎朝 9:00 JST にタスク管理メールを送信
# ※ Brevo 設定前は schedule をオフ。設定後に schedule のコメントを外す
name: Daily task email reminder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST（UTC 0:00）

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install python-dotenv
      - name: Verify Brevo API key
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "${BREVO_API_KEY}" ]; then
            echo "::error title=メール送信の設定不足::BREVO_API_KEY が GitHub Secrets に未登録です。"
            echo ""
            echo "【対処】Brevo で API キーを作成し、次のページで Secret を追加してください:"
            echo "https://github.com/Deek229/anime-gensaku-guide/settings/secrets/actions"
            echo "  Name: BREVO_API_KEY"
            echo "  Secret: （Brevo の API キー）"
            echo ""
            echo "追加後、Actions から「Run workflow」で再実行できます。"
            exit 1
          fi
          echo "BREVO_API_KEY: configured"
      - name: Send reminder email
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: a_n_k_6@hotmail.com
          REMINDER_EMAIL_TO: a_n_k_6@hotmail.com
          SITE_URL: https://anime-gensaku-guide.onrender.com
        run: python tools/gsc_reminder.py
