# 毎朝 9:00 JST にタスク管理メールを送信
name: Daily task email reminder

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install python-dotenv
      - name: Send reminder email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: onboarding@resend.dev
          REMINDER_EMAIL_TO: ${{ secrets.RESEND_TO_EMAIL }}
          SITE_URL: https://anime-gensaku-guide.onrender.com
        run: python tools/gsc_reminder.py
